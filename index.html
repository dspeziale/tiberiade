<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiberiade - Vercel Server Status</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #0070f3; }
        .status { font-weight: bold; color: #0070f3; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Tiberiade Server</h1>
        <p>Stato del Backend su Vercel: <span class="status">Attivo (Static Node)</span></p>
        <p>Database: <span class="status">Neon PostgreSQL collegato</span></p>
        <hr>
        <p><small>Nota: I protocolli GPS TCP/UDP richiedono un VPS dedicato.</small></p>
    </div>
</body>
</html>
